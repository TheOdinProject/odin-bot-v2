name: Test
on:
  pull_request:
    paths:
      - '**/*.js'
      - 'package*.json'

jobs:
  jest:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
        # Must --runInBand otherwise child process + GH Actions + async DB stuff
        # cause award-points.test.js tests to inconsistently fail
      - run: npm run test -- --runInBand
